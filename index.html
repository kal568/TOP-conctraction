<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TOP Construction Dashboard</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dropzone/5.9.3/dropzone.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/dropzone/5.9.3/dropzone.min.css" />
</head>
<body>

<div id="loginBox">
  <div class="loginCard">
    <h2>🔐 Admin Login</h2>
    <input type="password" id="password" placeholder="Enter Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<div id="dashboard" class="container">
  <h1>🏗TOP CONSTRUCTION Dashboard</h1>

  <div class="card">
    <h3>Workers Management</h3>
    <input type="text" id="newWorker" placeholder="Enter Worker Name">
    <button onclick="addWorker()">Add Worker</button>
    <ul id="workerList"></ul>
  </div>

  <div class="card">
    <h3>Daily Task Submission</h3>
    <label>Project
      <select id="project">
        <option>Project 1</option>
        <option>Project 2</option>
      </select>
    </label>
    <label>Worker
      <select id="worker"></select>
    </label>
    <label>Category
      <select id="category">
        <option>Emergency</option>
        <option>Consumable</option>
        <option>Ordered Items</option>
      </select>
    </label>
    <label>Quantity
      <input type="number" id="quantity">
    </label>
    <button onclick="submitTask()">Submit</button>
  </div>

  <div class="card">
    <h3>Submitted Tasks</h3>
    <ul id="taskList"></ul>
  </div>

  <div class="card">
    <h3>Payroll System</h3>
    <select id="projectSelect">
      <option>Project 1</option>
      <option>Project 2</option>
      <option>Project 3</option>
    </select>
    <input type="text" id="name" placeholder="Worker Name">
    <input type="number" id="rate" placeholder="Daily Wage">
    <input type="number" id="days" placeholder="Days Worked">
    <button onclick="addPayroll()">Add Worker</button>
    <table>
      <thead>
        <tr>
          <th>Project</th><th>Name</th><th>Wage</th><th>Days</th><th>Total</th><th>Action</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <button onclick="exportPDF()">Export PDF</button>
  </div>

  <div class="card">
    <h3>📊 Weekly Task Report</h3>
    <canvas id="taskChart"></canvas>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
